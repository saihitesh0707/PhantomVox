<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhantomVox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0a0f; color: white; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    #home-screen { background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 100%); }
    .logo { font-size: 60px; margin-bottom: 10px; }
    .app-name { font-size: 32px; font-weight: bold; color: #a855f7; margin-bottom: 5px; }
    .tagline { font-size: 14px; color: #666; margin-bottom: 40px; text-align: center; }
    .status-ring {
      width: 150px; height: 150px; border-radius: 50%;
      border: 3px solid #a855f7; display: flex; align-items: center;
      justify-content: center; margin-bottom: 30px;
      animation: pulse 2s infinite; cursor: pointer;
      background: rgba(168, 85, 247, 0.1);
    }
    .status-ring:active { transform: scale(0.95); }
    .status-text { text-align: center; }
    .status-text p { font-size: 12px; color: #a855f7; margin-top: 5px; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
      70% { box-shadow: 0 0 0 20px rgba(168, 85, 247, 0); }
      100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
    }
    .features { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 340px; margin-bottom: 30px; }
    .feature-card {
      background: #1a1a2e; border: 1px solid #2a2a4e;
      border-radius: 12px; padding: 16px; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .feature-card:hover { border-color: #a855f7; background: #2a1a4e; }
    .feature-card .icon { font-size: 28px; margin-bottom: 8px; }
    .feature-card p { font-size: 12px; color: #aaa; }
    .feature-card h3 { font-size: 14px; color: white; margin-bottom: 4px; }
    .sos-btn {
      width: 100%; max-width: 340px; padding: 18px;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      border: none; border-radius: 16px; color: white;
      font-size: 20px; font-weight: bold; cursor: pointer;
      animation: sos-pulse 1.5s infinite;
    }
    @keyframes sos-pulse {
      0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
      70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }
    #call-screen { background: linear-gradient(135deg, #1a1a2e, #0a0a1e); text-align: center; }
    .caller-avatar { font-size: 80px; margin-bottom: 20px; }
    .caller-name { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
    .call-status { font-size: 16px; color: #aaa; margin-bottom: 60px; }
    .call-duration { font-size: 20px; color: #a855f7; margin-bottom: 40px; }
    .call-buttons { display: flex; gap: 40px; justify-content: center; }
    .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-answer { background: #22c55e; }
    .btn-decline { background: #dc2626; }
    #contacts-screen { background: #0a0a0f; justify-content: flex-start; padding-top: 60px; }
    .screen-header { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #a855f7; }
    .contact-input { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 340px; margin-bottom: 20px; }
    .contact-input input { padding: 12px; background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 8px; color: white; font-size: 14px; }
    .contact-input input::placeholder { color: #666; }
    .add-btn { padding: 12px; background: #a855f7; border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
    .contacts-list { width: 100%; max-width: 340px; }
    .contact-item { background: #1a1a2e; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .contact-item span { font-size: 14px; }
    .contact-item button { background: #dc2626; border: none; border-radius: 4px; color: white; padding: 4px 8px; cursor: pointer; font-size: 12px; }
    .back-btn { position: fixed; top: 20px; left: 20px; background: #1a1a2e; border: none; border-radius: 8px; color: white; padding: 8px 16px; cursor: pointer; font-size: 14px; }
    .voice-status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 1px solid #a855f7; border-radius: 20px; padding: 8px 20px; font-size: 12px; color: #a855f7; }
    .alert-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #dc2626; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: bold; display: none; z-index: 999; }
  </style>
</head>
<body>
  <div class="alert-popup" id="alert-popup">🚨 SOS TRIGGERED!</div>

  <div class="screen active" id="home-screen">
    <div class="logo">👻</div>
    <div class="app-name">PhantomVox</div>
    <div class="tagline">Invisible. Silent. Always Protecting.</div>
    <div class="status-ring" onclick="triggerSOS()">
      <div class="status-text">
        <div style="font-size:36px;">🛡️</div>
        <p>PROTECTED</p>
      </div>
    </div>
    <div class="features">
      <div class="feature-card" onclick="showFakeCall()">
        <div class="icon">📞</div>
        <h3>Fake Call</h3>
        <p>Simulate incoming call</p>
      </div>
      <div class="feature-card" onclick="showContacts()">
        <div class="icon">👥</div>
        <h3>Contacts</h3>
        <p>Emergency contacts</p>
      </div>
      <div class="feature-card" onclick="findPolice()">
        <div class="icon">🚔</div>
        <h3>Police</h3>
        <p>Find nearest station</p>
      </div>
      <div class="feature-card" onclick="startVoice()">
        <div class="icon">🎤</div>
        <h3>Voice</h3>
        <p>Say "help me"</p>
      </div>
    </div>
    <button class="sos-btn" onclick="triggerSOS()">🆘 EMERGENCY SOS</button>
  </div>

  <div class="screen" id="call-screen">
    <button class="back-btn" onclick="showHome()">← Back</button>
    <div class="caller-avatar">👩</div>
    <div class="caller-name" id="caller-name">Mom</div>
    <div class="call-status" id="call-status">Incoming Call...</div>
    <div class="call-duration" id="call-timer">Ringing...</div>
    <div class="call-buttons">
      <button class="call-btn btn-decline" onclick="showHome()">📵</button>
      <button class="call-btn btn-answer" onclick="answerCall()">📞</button>
    </div>
  </div>

  <div class="screen" id="contacts-screen">
    <button class="back-btn" onclick="showHome()">← Back</button>
    <div class="screen-header">👥 Emergency Contacts</div>
    <div class="contact-input">
      <input type="text" id="contact-name" placeholder="Contact Name" />
      <input type="tel" id="contact-phone" placeholder="Phone Number" />
      <button class="add-btn" onclick="addContact()">+ Add Contact</button>
    </div>
    <div class="contacts-list" id="contacts-list"></div>
  </div>

  <div class="voice-status" id="voice-status">🎤 Say "help me" to trigger SOS</div>

  <script>
    let callInterval;
    let ringInterval;
    let audioCtx;
    let callSeconds = 0;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showHome() {
      showScreen('home-screen');
      clearInterval(callInterval);
      clearInterval(ringInterval);
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }

    function showContacts() {
      showScreen('contacts-screen');
      loadContacts();
    }

    function ring(ctx) {
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.frequency.value = 440;
      oscillator.type = 'sine';
      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      oscillator.start();
      oscillator.stop(ctx.currentTime + 0.5);
    }

    function showFakeCall() {
      showScreen('call-screen');
      document.getElementById('call-timer').textContent = 'Ringing...';
      document.getElementById('call-status').textContent = 'Incoming Call...';
      callSeconds = 0;

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      ring(audioCtx);
      setTimeout(() => ring(audioCtx), 600);
      ringInterval = setInterval(() => {
        ring(audioCtx);
        setTimeout(() => ring(audioCtx), 600);
      }, 2000);

      setTimeout(() => {
        document.getElementById('call-timer').textContent = '00:00';
        callInterval = setInterval(() => {
          callSeconds++;
          const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
          const s = String(callSeconds % 60).padStart(2, '0');
          document.getElementById('call-timer').textContent = `${m}:${s}`;
        }, 1000);
      }, 2000);
    }

    function answerCall() {
      clearInterval(ringInterval);
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      document.getElementById('call-status').textContent = 'Connected';
    }

    function triggerSOS() {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const contacts = JSON.parse(localStorage.getItem('phantomvox_contacts') || '[]');
        const message = `🆘 EMERGENCY! I need help! My location: https://maps.google.com/?q=${lat},${lng}`;
        if (contacts.length > 0) {
          window.open(`https://wa.me/${contacts[0].phone}?text=${encodeURIComponent(message)}`);
        } else {
          window.open(`https://wa.me/?text=${encodeURIComponent(message)}`);
        }
        showAlert('🚨 SOS TRIGGERED — Help is coming!');
      }, () => {
        showAlert('🚨 SOS TRIGGERED!');
        window.open(`https://wa.me/?text=${encodeURIComponent('🆘 EMERGENCY! I need help!')}`);
      });
    }

    function findPolice() {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        window.open(`https://www.google.com/maps/search/police+station/@${lat},${lng},15z`);
      }, () => {
        window.open('https://www.google.com/maps/search/police+station/');
      });
    }

    function addContact() {
      const name = document.getElementById('contact-name').value.trim();
      const phone = document.getElementById('contact-phone').value.trim();
      if (!name || !phone) return;
      const contacts = JSON.parse(localStorage.getItem('phantomvox_contacts') || '[]');
      contacts.push({ name, phone });
      localStorage.setItem('phantomvox_contacts', JSON.stringify(contacts));
      document.getElementById('contact-name').value = '';
      document.getElementById('contact-phone').value = '';
      loadContacts();
    }

    function loadContacts() {
      const contacts = JSON.parse(localStorage.getItem('phantomvox_contacts') || '[]');
      const list = document.getElementById('contacts-list');
      list.innerHTML = contacts.map((c, i) => `
        <div class="contact-item">
          <span>👤 ${c.name} — ${c.phone}</span>
          <button onclick="removeContact(${i})">Remove</button>
        </div>
      `).join('');
    }

    function removeContact(i) {
      const contacts = JSON.parse(localStorage.getItem('phantomvox_contacts') || '[]');
      contacts.splice(i, 1);
      localStorage.setItem('phantomvox_contacts', JSON.stringify(contacts));
      loadContacts();
    }

    function startVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        showAlert('Voice not supported on this browser');
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.onresult = (e) => {
        const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
        console.log('Heard:', transcript);
        if (transcript.includes('help me') || transcript.includes('help')) {
          triggerSOS();
        }
      };
      recognition.start();
      document.getElementById('voice-status').textContent = '🎤 Listening... Say "help me"';
      showAlert('✅ Voice activated! Say "help me"');
    }

    let lastX, lastY, lastZ;
    const SHAKE_THRESHOLD = 15;
    window.addEventListener('devicemotion', (e) => {
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;
      if (lastX !== undefined) {
        const deltaX = Math.abs(acc.x - lastX);
        const deltaY = Math.abs(acc.y - lastY);
        const deltaZ = Math.abs(acc.z - lastZ);
        if (deltaX + deltaY + deltaZ > SHAKE_THRESHOLD) {
          triggerSOS();
        }
      }
      lastX = acc.x; lastY = acc.y; lastZ = acc.z;
    });

    function showAlert(msg) {
      const alert = document.getElementById('alert-popup');
      alert.textContent = msg;
      alert.style.display = 'block';
      setTimeout(() => alert.style.display = 'none', 3000);
    }
  </script>
</body>
</html>
